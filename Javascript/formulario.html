<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio DOM eventos y funciones</title>
    <link rel="stylesheet" href="">
    <script type="text/javascript" src="js/29-ejercicio-dom.js"></script>
</head>
<style>
    .box{
        width: 200px;
        height: 250px;
        float: left;
        margin: 20px;
    }
    .dashe{
        border: 3px dashed black;
        padding: 5px;
    }
</style>
<body>
    <h1>ejercicio DOM eventos y funciones</h1>
    <div class="box">
        <form action="#" method="POST" id="formulatio">
            <label for="nombre">Nombre</label>
                <input type="text" name="nombre" id="nombre"><br>

                <span id="error_nombre"></span>
                <label for="apellidos">Apellidos</label>
                <input type="text" name="apellidos" id="apellidos"><br>

                <label for="edad">Edad</label>
                <input type="text" name="edad" id="edad"><br>

                <input type="submit" value="enviar" id="submit">
        </form>
    </div>

    <div class="box dashed">
        <h3>informacion del usuario</h3>
        <hr>
        <p id="p_nombre">
            Nombre:<span></span>
        </p>

        <p id="p_apellidos">
            Apellidos:<span></span>
        </p>
        <p id="p_edad">
            Edad:<span></span>
        </p>
    </div>
</body>
</html>
